name: 🔗 Run Builder
on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'build platforms'
        type: choice
        default: 'all'
        options: [web,windows,all]
      targets:
        description: 'build targets for windows'
        type: choice
        default: 'all'
        options: [template,editor,all]
      archs:
        description: 'build archs for windows'
        type: choice
        default: "x86_64"
        options:
          - "x86"
          - "x86_64"
          - "arm64"
          - "x86,x86_64"
          - "x86_64,arm64"
          - "x86,x86_64,arm64"
      repo:
        description: 'Repository to use for the build'
        type: string
        default: 'godotengine/godot'
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
        default: '4.6'
      tag:
        description: 'tag to use for downloading the repo'
        type: string
        default: '4.6.1-stable'
      tag_release:
        description: 'tag to use for releasing the build'
        type: string
        default: '4.6.1.stable'
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
        default: ''
      template_module_flags:
        description: 'Extra module flags for template build, e.g. disable_3d=yes'
        type: string
        default: ''
      release_repo:
        description: 'Repository to use for the release (leave empty for current repo)'
        type: string
        default: ''
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: choice
        default: "lto=thin"
        options:
          - "lto=none"
          - "lto=thin"
          - "lto=full"

jobs:
  windows-build:
    name: 🏁 Windows
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows'  }}
    uses: ./.github/workflows/windows_builder.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto == 'lto=thin' && 'lto=none' || inputs.lto }}
      targets: ${{ inputs.targets == 'all' && 'editor,template_release,template_debug' || inputs.targets == 'template' && 'template_release,template_debug' || inputs.targets }}
      archs: ${{ format('{0},',inputs.archs) }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  web-build:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'web' }}
    name: 🌐 Web
    uses: ./.github/workflows/web_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  release-windows:
    name: 🚀 Create Windows Release
    if: ${{ inputs.platforms == 'windows'  }}
    permissions:
      contents: write
      actions: read
      packages: write
    needs:
      - windows-build
    uses: ./.github/workflows/release_for_windows_builder.yml
    with:
      platforms: ${{ inputs.platforms }}
      targets: ${{ inputs.targets }}
      archs: ${{ inputs.archs }}
      base-branch: ${{ inputs.base-branch }}
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      tag_release: ${{ inputs.tag_release }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
      release_repo: ${{ inputs.release_repo }}
    secrets: inherit
  
  release-web:
    name: 🚀 Create Web Release
    if: ${{ inputs.platforms == 'web'  }}
    permissions:
      contents: write
      actions: read
      packages: write
    needs:
      - web-build
    uses: ./.github/workflows/release_for_windows_builder.yml
    with:
      platforms: ${{ inputs.platforms }}
      targets: ${{ inputs.targets }}
      archs: ${{ inputs.archs }}
      base-branch: ${{ inputs.base-branch }}
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      tag_release: ${{ inputs.tag_release }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
      release_repo: ${{ inputs.release_repo }}
    secrets: inherit

  release-all:
    name: 🚀 Create All Release
    if: ${{ inputs.platforms == 'all'  }}
    permissions:
      contents: write
      actions: read
      packages: write
    needs:
      - windows-build
      - web-build
    uses: ./.github/workflows/release_for_windows_builder.yml
    with:
      platforms: ${{ inputs.platforms }}
      targets: ${{ inputs.targets }}
      archs: ${{ inputs.archs }}
      base-branch: ${{ inputs.base-branch }}
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      tag_release: ${{ inputs.tag_release }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
      release_repo: ${{ inputs.release_repo }}
    secrets: inherit

